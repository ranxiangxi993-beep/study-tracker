name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npx expo prebuild --platform android
      - run: cp native/lock/*.kt android/app/src/main/java/com/kaoyan/studytimer/lock/
      - run: cp native/res/*.xml android/app/src/main/res/xml/
      - run: cp native/AndroidManifest.xml android/app/src/main/
      - run: echo 'import com.kaoyan.studytimer.lock.StudyLockPackage' | cat - android/app/src/main/java/com/kaoyan/studytimer/MainApplication.kt > /tmp/tmp && mv /tmp/tmp android/app/src/main/java/com/kaoyan/studytimer/MainApplication.kt
      - run: sed -i 's|// Packages that cannot be autolinked|add(StudyLockPackage());\n              // Packages|' android/app/src/main/java/com/kaoyan/studytimer/MainApplication.kt
      - run: cd android && ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
