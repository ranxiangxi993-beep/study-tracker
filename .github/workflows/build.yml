name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
# 同一时间只跑最新一次构建，自动取消进行中的旧构建，避免抢发布冲突
concurrency:
  group: build-apk
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm install
      - run: npx expo prebuild --platform android
      # expo prebuild may omit a version for kotlin-gradle-plugin; pin to 2.1.20
      - run: sed -i "s|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20')|" android/build.gradle
      - run: mkdir -p android/app/src/main/java/com/kaoyan/studytimer/lock android/app/src/main/res/xml android/app/src/main/res/values android/app/src/main/res/drawable
      - run: cp native/lock/*.kt android/app/src/main/java/com/kaoyan/studytimer/lock/
      - run: cp -r native/res/drawable-* android/app/src/main/res/
      - run: cp native/res/xml/accessibility_service_config.xml android/app/src/main/res/xml/
      - run: cp native/res/xml/file_paths.xml android/app/src/main/res/xml/
      - run: cp native/res/device_admin_policies.xml android/app/src/main/res/xml/
      - run: cp native/res/values/strings.xml android/app/src/main/res/values/
      - run: cp native/AndroidManifest.xml android/app/src/main/
      - run: sed -i 's|import expo.modules.ReactNativeHostWrapper|import expo.modules.ReactNativeHostWrapper\nimport com.kaoyan.studytimer.lock.StudyLockPackage|' android/app/src/main/java/com/kaoyan/studytimer/MainApplication.kt
      - run: sed -i 's|// add(MyReactNativePackage())|add(StudyLockPackage())|' android/app/src/main/java/com/kaoyan/studytimer/MainApplication.kt
      # Gradle 分发包偶尔遇 GitHub CDN 504，自动重试几次
      - name: Build release APK (retry on transient failures)
        run: |
          cd android
          for i in 1 2 3 4; do
            ./gradlew assembleRelease && exit 0
            echo "::warning::第 $i 次构建失败（可能是 Gradle 下载 504），15s 后重试..."
            sleep 15
          done
          echo "::error::构建重试 4 次仍失败"
          exit 1

      - name: Find and verify APK
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" 2>/dev/null
          APK_PATH=$(find android -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH ($(du -sh $APK_PATH | cut -f1))"

      - name: Package release assets
        run: |
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode || 1")
          echo "{\"versionCode\":$VERSION_CODE}" > version.json
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="研途 v${{ env.VERSION_CODE }} ($(date '+%Y-%m-%d %H:%M'))"
          NOTES="### 下载安装
          1. 点击下方 \`app-release.apk\` 下载
          2. 手机允许「安装未知来源应用」后安装

          **版本号**: ${{ env.VERSION_CODE }}
          **提交**: ${{ github.sha }}"
          # 原地更新而非"删了重建"：避免 delete 残留 tag / delete→create 的 API 竞态
          if gh release view latest-build >/dev/null 2>&1; then
            echo "latest-build 已存在 → 原地更新资产与说明（--clobber 覆盖同名文件）"
            gh release upload latest-build \
              "${{ env.APK_PATH }}#app-release.apk" version.json --clobber
            gh release edit latest-build --title "$TITLE" --notes "$NOTES"
          else
            echo "latest-build 不存在 → 新建"
            gh release create latest-build \
              --title "$TITLE" --notes "$NOTES" \
              "${{ env.APK_PATH }}#app-release.apk" version.json
          fi
